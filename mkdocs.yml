site_name: PMT MLSecOps
site_description: Pipeline MLOps para detección de ataques web con integración Blue Team y Red Team
site_author: Permotion
site_url: https://permotion.github.io/PMT_MLSecOps

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Inicio: index.md
  - Contexto y Motivación:
    - Contexto: docs/contexto.md
    - Objetivos: docs/objetivos.md
  - Dataset:
    - CSIC 2010: docs/dataset.md
  - Stack Tecnológico: docs/stack.md
  - Arquitectura:
    - Visión general del pipeline: docs/arquitectura.md
    - Stage 0 — Curado del dataset: docs/stage_0_curacion.md
    - Stage 1-10 — Flujo completo: docs/flujo_completo.md
  - Conceptos Clave:
    - MLOps y gobernanza: docs/conceptos_mlops.md
    - Blue Team y Red Team: docs/conceptos_equipos.md
    - Threshold calibration: docs/conceptos_threshold.md
  - Roles y Responsabilidades:
    - Matriz RACI: docs/raci.md
    - Blue Team Guide: docs/blue_team.md
    - Red Team Guide: docs/red_team.md
  - Glosario: docs/glosario.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: es

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/permotion

dev_addr: "0.0.0.0:8000"